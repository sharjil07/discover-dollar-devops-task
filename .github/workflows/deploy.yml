name: CI-CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build backend image
      run: |
        docker build -t sharjil07/crud-dd-backend ./backend
        docker push sharjil07/crud-dd-backend

    - name: Build frontend image
      run: |
        docker build -t sharjil07/crud-dd-frontend ./frontend
        docker push sharjil07/crud-dd-frontend
